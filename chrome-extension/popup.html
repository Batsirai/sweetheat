<!DOCTYPE html>
<html>
<head>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #f1f5f9;
      padding: 16px;
    }
    .header { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
    .header h1 { font-size: 16px; font-weight: 700; color: #22c55e; }
    .header span { font-size: 11px; color: #64748b; }
    .page-info { background: #1e293b; border-radius: 8px; padding: 10px; margin-bottom: 10px; }
    .page-title { font-size: 13px; font-weight: 600; line-height: 1.3; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .page-url { font-size: 10px; color: #64748b; margin-top: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .meta-row { display: flex; align-items: center; gap: 6px; margin-top: 6px; }
    .badge { font-size: 10px; padding: 2px 6px; border-radius: 4px; background: #334155; color: #94a3b8; }
    .badge.ok { background: #052e16; color: #4ade80; }
    .badge.warn { background: #422006; color: #fbbf24; }
    select { width: 100%; background: #1e293b; border: 1px solid #334155; border-radius: 8px; color: #f1f5f9; padding: 8px; font-size: 12px; margin-bottom: 8px; font-family: inherit; }
    textarea { width: 100%; background: #1e293b; border: 1px solid #334155; border-radius: 8px; color: #f1f5f9; padding: 8px; font-size: 12px; resize: none; font-family: inherit; }
    textarea:focus { outline: none; border-color: #22c55e; }
    textarea::placeholder { color: #475569; }
    .actions { display: flex; gap: 8px; margin-top: 8px; }
    button { flex: 1; padding: 10px; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.15s; }
    button:hover { opacity: 0.9; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-knowledge { background: #7c3aed; color: white; }
    .btn-seed { background: #16a34a; color: white; }
    .status { text-align: center; font-size: 12px; margin-top: 8px; min-height: 18px; }
    .status.ok { color: #22c55e; }
    .status.err { color: #ef4444; }
    .open-link { display: block; text-align: center; font-size: 11px; color: #22c55e; text-decoration: none; margin-top: 10px; padding: 6px; border-radius: 6px; background: #1e293b; }
    .open-link:hover { background: #334155; }
  </style>
</head>
<body>
  <div class="header">
    <h1>Sweet Heat</h1>
    <span>Content Factory</span>
  </div>

  <div class="page-info">
    <div class="page-title" id="pageTitle">Loading...</div>
    <div class="page-url" id="pageUrl"></div>
    <div class="meta-row">
      <span class="badge" id="platform"></span>
      <span class="badge" id="contentStatus">Extracting...</span>
    </div>
  </div>

  <!-- Brand -->
  <select id="brandSelect">
    <option value="">Select brand...</option>
  </select>

  <!-- Topic (loads when brand is selected) -->
  <select id="topicSelect" style="display:none;">
    <option value="">Auto (default topic)</option>
  </select>

  <!-- Quick note -->
  <textarea id="notes" rows="2" placeholder="Add a note (optional)..." style="margin-bottom:4px;"></textarea>

  <!-- Manual paste fallback -->
  <details style="margin-bottom:4px;">
    <summary style="font-size:11px;color:#64748b;cursor:pointer;">Paste content manually</summary>
    <textarea id="manualContent" rows="4" placeholder="Paste article text here..." style="margin-top:4px;font-size:11px;resize:vertical;"></textarea>
  </details>

  <!-- Two actions: Knowledge (learn) or Seed (create content from this) -->
  <div class="actions">
    <button class="btn-knowledge" id="knowledgeBtn" title="Add to knowledge base for learning">
      Learn
    </button>
    <button class="btn-seed" id="seedBtn" title="Create a content seed from this">
      Seed
    </button>
  </div>

  <div class="status" id="status"></div>

  <a class="open-link" href="https://sweet-content.batsirai.workers.dev/" target="_blank">
    Open Sweet Heat
  </a>

  <script src="popup.js"></script>
</body>
</html>
