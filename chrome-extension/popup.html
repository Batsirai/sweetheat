<!DOCTYPE html>
<html>
<head>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #f1f5f9;
      padding: 16px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }
    .header h1 {
      font-size: 16px;
      font-weight: 700;
      color: #22c55e;
    }
    .header span {
      font-size: 11px;
      color: #64748b;
    }
    .page-info {
      background: #1e293b;
      border-radius: 8px;
      padding: 10px;
      margin-bottom: 12px;
    }
    .page-title {
      font-size: 13px;
      font-weight: 600;
      line-height: 1.3;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .page-url {
      font-size: 10px;
      color: #64748b;
      margin-top: 4px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .platform-badge {
      display: inline-block;
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 4px;
      background: #334155;
      color: #94a3b8;
      margin-top: 6px;
    }
    textarea {
      width: 100%;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 8px;
      color: #f1f5f9;
      padding: 8px;
      font-size: 12px;
      resize: none;
      margin-bottom: 8px;
      font-family: inherit;
    }
    textarea:focus { outline: none; border-color: #22c55e; }
    textarea::placeholder { color: #475569; }
    .actions {
      display: flex;
      gap: 8px;
    }
    button {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    button:hover { opacity: 0.9; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-send {
      background: #16a34a;
      color: white;
    }
    .btn-seed {
      background: #1e293b;
      border: 1px solid #334155;
      color: #94a3b8;
    }
    .status {
      text-align: center;
      font-size: 12px;
      margin-top: 8px;
      min-height: 18px;
    }
    .status.ok { color: #22c55e; }
    .status.err { color: #ef4444; }
    .open-link {
      display: block;
      text-align: center;
      font-size: 11px;
      color: #22c55e;
      text-decoration: none;
      margin-top: 10px;
      padding: 6px;
      border-radius: 6px;
      background: #1e293b;
    }
    .open-link:hover { background: #334155; }
  </style>
</head>
<body>
  <div class="header">
    <h1>Sweet Heat</h1>
    <span>Content Factory</span>
  </div>

  <div class="page-info">
    <div class="page-title" id="pageTitle">Loading...</div>
    <div class="page-url" id="pageUrl"></div>
    <span class="platform-badge" id="platform"></span>
  </div>

  <select id="brandSelect" style="width:100%;background:#1e293b;border:1px solid #334155;border-radius:8px;color:#f1f5f9;padding:8px;font-size:12px;margin-bottom:8px;font-family:inherit;appearance:none;">
    <option value="">No brand (general)</option>
  </select>

  <textarea id="notes" rows="2" placeholder="Add a note (optional)..."></textarea>

  <div class="actions">
    <button class="btn-send" id="sendBtn">Send to Inbox</button>
  </div>

  <div class="status" id="status"></div>

  <a class="open-link" href="https://sweet-content.batsirai.workers.dev/" target="_blank">
    Open Sweet Heat
  </a>

  <script src="popup.js"></script>
</body>
</html>
